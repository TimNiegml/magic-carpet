<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魔毯之旅 · Hoffman 冥想</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c0b09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="魔毯之旅">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0c0b09}

#app{
  min-height:100vh;background:#0c0b09;
  font-family:'Noto Serif SC','STSong',Georgia,serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;position:relative;overflow:hidden;
}
#star-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
.z{position:relative;z-index:2}

.eyebrow{
  font-size:10px;letter-spacing:8px;color:#6a5228;
  font-family:sans-serif;margin-bottom:12px;text-align:center
}
.main-title{
  font-size:2rem;font-weight:300;color:#c9a84c;
  letter-spacing:10px;text-align:center;margin-bottom:32px
}

/* ── Start overlay（解锁音频必须的用户手势）── */
#start-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(12,11,9,0.92);backdrop-filter:blur(3px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
  transition:opacity 0.8s
}
#start-overlay.hide{opacity:0;pointer-events:none}
.start-btn{
  border:0.5px solid #9a8048;background:rgba(154,128,72,0.1);
  color:#c9a84c;font-family:'Noto Serif SC',serif;font-size:15px;
  letter-spacing:6px;padding:16px 44px;border-radius:40px;cursor:pointer;
  transition:all 0.3s;animation:blink-soft 2.6s ease-in-out infinite
}
.start-btn:hover{background:rgba(154,128,72,0.25);border-color:#c9a84c}
.start-hint{font-size:10px;letter-spacing:4px;color:#6a5228;font-family:sans-serif}

/* ── Carpet SVG ── */
.carpet-wrap{margin-bottom:22px;animation:carpet-float 5s ease-in-out infinite}

/* ── Scene label ── */
.scene-label{
  font-size:11px;letter-spacing:5px;color:#6a5228;
  font-family:sans-serif;text-align:center;min-height:20px;margin-bottom:16px;
  transition:opacity 0.6s
}

/* ── Narration ── */
.narration-box{
  max-width:520px;width:100%;
  border:0.5px solid rgba(201,168,76,0.2);border-radius:16px;
  padding:30px 34px;text-align:center;line-height:2.1;
  font-size:1rem;font-weight:300;min-height:148px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;background:rgba(255,255,255,0.018);
  transition:opacity 0.5s
}
#narration-text{color:#8a7040;transition:color 0.6s}
#narration-text.bright{color:#ddd0a0}
#narration-text .said{color:#ddd0a0}
#narration-text .unsaid{color:#6a5b35}

/* ── Speaking bars ── */
#bars{display:none;gap:5px;align-items:flex-end;height:24px;margin-bottom:20px}
.bar{width:3px;border-radius:2px;background:#8a7040;animation:bar-up 0.75s ease-in-out infinite alternate}

/* ── Interaction area ── */
#interact{display:none;flex-direction:column;align-items:center}
.cta{
  font-size:11px;letter-spacing:5px;color:#6a5228;
  font-family:sans-serif;margin-bottom:20px;text-align:center
}
#transcript-line{
  font-size:13px;color:#9a8048;font-style:italic;
  min-height:22px;margin-bottom:12px;text-align:center
}

/* ── Mic button ── */
.mic-wrap{position:relative;margin-bottom:26px}
.mic-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:0.5px solid rgba(201,168,76,0.5);
  animation:ring-out 1.5s ease-out infinite;display:none
}
.mic-btn{
  width:72px;height:72px;border-radius:50%;
  border:0.5px solid #9a8048;background:rgba(154,128,72,0.1);
  color:#c9a84c;font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;outline:none
}
.mic-btn svg{width:26px;height:26px;stroke:#c9a84c;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.mic-btn:hover{background:rgba(154,128,72,0.22)}
.mic-btn.on{background:rgba(154,128,72,0.3);border-color:#c9a84c}
.mic-btn.on svg{stroke:#e8d0a0}

/* ── Text input fallback ── */
.type-link{
  font-size:11px;color:#6a5228;cursor:pointer;margin-bottom:18px;
  font-family:sans-serif;letter-spacing:2px;transition:color 0.2s
}
.type-link:hover{color:#c9a84c}
.type-row{display:none;gap:8px;margin-bottom:22px;width:100%;max-width:320px}
.type-row input{
  flex:1;background:rgba(154,128,72,0.08);border:0.5px solid rgba(154,128,72,0.35);
  border-radius:22px;color:#ddd0a0;font-family:'Noto Serif SC',serif;
  font-size:14px;padding:10px 18px;outline:none;min-width:0
}
.type-row input::placeholder{color:#6a5228}
.type-row button{
  background:rgba(154,128,72,0.15);border:0.5px solid #9a8048;border-radius:22px;
  color:#c9a84c;font-size:13px;padding:10px 20px;cursor:pointer;letter-spacing:2px;
  font-family:'Noto Serif SC',serif
}

/* ── Blueprint cards ── */
.bp-grid{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  max-width:560px;margin-bottom:6px
}
.bp-card{
  width:100px;padding:14px 8px 12px;text-align:center;cursor:pointer;
  background:rgba(154,128,72,0.06);border:0.5px solid rgba(154,128,72,0.28);
  border-radius:14px;transition:all 0.25s;position:relative
}
.bp-card:hover{background:rgba(154,128,72,0.18);border-color:#9a8048;transform:translateY(-3px)}
.bp-emoji{font-size:20px;margin-bottom:7px}
.bp-title{font-size:13px;color:#c9a84c;letter-spacing:2px;margin-bottom:5px}
.bp-sub{font-size:9px;color:#6a5228;font-family:sans-serif;letter-spacing:1px;line-height:1.6}
.bp-ready{
  position:absolute;top:7px;right:9px;width:5px;height:5px;border-radius:50%;
  background:#4a7c4a;opacity:0;transition:opacity 0.5s
}
.bp-card.cached .bp-ready{opacity:0.85}

/* ── Free chips ── */
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:460px;margin-top:14px}
.chip{
  background:rgba(154,128,72,0.07);border:0.5px solid rgba(154,128,72,0.28);
  border-radius:20px;color:#9a8048;font-size:12px;padding:6px 15px;
  cursor:pointer;letter-spacing:1.5px;transition:all 0.2s;font-family:sans-serif
}
.chip:hover{background:rgba(154,128,72,0.2);color:#c9a84c;border-color:#9a8048}

/* ── Flying indicator ── */
#flying-wrap{display:none;text-align:center}
.flying-text{
  font-size:11px;letter-spacing:6px;color:#6a5228;
  font-family:sans-serif;animation:blink-soft 2s ease-in-out infinite
}

/* ── Settings（音量设置）── */
#settings-btn{
  position:fixed;top:18px;right:18px;z-index:40;width:38px;height:38px;border-radius:50%;
  border:0.5px solid rgba(154,128,72,0.4);background:rgba(12,11,9,0.6);color:#9a8048;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;
  transition:all 0.25s;user-select:none
}
#settings-btn:hover{color:#c9a84c;border-color:#9a8048}
#settings-panel{
  position:fixed;top:64px;right:18px;z-index:40;width:230px;
  background:rgba(20,18,14,0.95);border:0.5px solid rgba(154,128,72,0.35);
  border-radius:14px;padding:18px 20px;display:none;flex-direction:column;gap:14px
}
#settings-panel.open{display:flex}
.set-row{display:flex;flex-direction:column;gap:6px}
.set-label{
  font-size:11px;color:#9a8048;font-family:sans-serif;letter-spacing:2px;
  display:flex;justify-content:space-between
}
.set-row input[type=range]{width:100%;accent-color:#c9a84c;height:3px}
.voice-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.voice-item{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:8px 12px;border-radius:10px;cursor:pointer;
  border:0.5px solid rgba(154,128,72,0.25);background:rgba(154,128,72,0.05);
  transition:all 0.2s
}
.voice-item:hover{background:rgba(154,128,72,0.15)}
.voice-item.sel{border-color:#c9a84c;background:rgba(201,168,76,0.15)}
.voice-name{font-size:12px;color:#c9a84c;letter-spacing:1px}
.voice-desc{font-size:9px;color:#6a5228;font-family:sans-serif;margin-top:2px}
.voice-try{
  flex-shrink:0;font-size:10px;color:#9a8048;font-family:sans-serif;letter-spacing:1px;
  border:0.5px solid rgba(154,128,72,0.4);border-radius:12px;padding:4px 10px;cursor:pointer
}
.voice-try:hover{color:#c9a84c;border-color:#c9a84c}
.set-toggle{display:flex;align-items:center;justify-content:space-between}
.set-toggle input{accent-color:#c9a84c;width:16px;height:16px;cursor:pointer}
.style-opts{display:flex;gap:6px;flex-wrap:wrap}
.style-opt{
  padding:5px 12px;border-radius:14px;font-size:11px;cursor:pointer;
  color:#9a8048;font-family:sans-serif;letter-spacing:1px;
  border:0.5px solid rgba(154,128,72,0.3);background:rgba(154,128,72,0.05);transition:all 0.2s
}
.style-opt:hover{background:rgba(154,128,72,0.15)}
.style-opt.sel{color:#c9a84c;border-color:#c9a84c;background:rgba(201,168,76,0.15)}

/* ── Toast（错误提示）── */
#toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:60;
  background:rgba(60,30,25,0.92);border:0.5px solid rgba(200,110,90,0.4);
  color:#d8a090;font-size:12px;font-family:sans-serif;letter-spacing:1px;
  padding:10px 22px;border-radius:24px;opacity:0;pointer-events:none;
  transition:opacity 0.4s;max-width:80vw;text-align:center
}
#toast.show{opacity:1}

/* ── Animations ── */
@keyframes carpet-float{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-16px) rotate(1.5deg)}}
@keyframes bar-up{from{height:3px}to{height:20px}}
@keyframes ring-out{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.4);opacity:0}}
@keyframes blink-soft{0%,100%{opacity:0.4}50%{opacity:0.9}}
@keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fade-in 0.6s ease forwards}
</style>
</head>
<body>
<div id="app">
  <canvas id="star-canvas"></canvas>

  <!-- 开始遮罩：浏览器要求音频播放必须由用户手势触发 -->
  <div id="start-overlay">
    <div class="eyebrow">HOFFMAN · 冥想旅程</div>
    <div class="main-title" style="margin-bottom:6px">魔 毯 之 旅</div>
    <button class="start-btn" id="start-btn">轻触魔毯 · 开始旅程</button>
    <div class="start-hint">建议佩戴耳机 · 找一个安静的角落</div>
  </div>

  <div class="z eyebrow">HOFFMAN · 冥想旅程</div>
  <div class="z main-title">魔 毯 之 旅</div>

  <!-- Carpet SVG -->
  <div class="z carpet-wrap">
    <svg viewBox="0 0 130 80" width="130" height="80" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#9a8048" stroke-width="1.3" opacity="0.65">
        <line x1="11" y1="20" x2="3" y2="11"/><line x1="11" y1="32" x2="2" y2="32"/>
        <line x1="11" y1="44" x2="3" y2="44"/><line x1="11" y1="56" x2="3" y2="64"/>
        <line x1="119" y1="20" x2="127" y2="11"/><line x1="119" y1="32" x2="128" y2="32"/>
        <line x1="119" y1="44" x2="127" y2="44"/><line x1="119" y1="56" x2="127" y2="64"/>
      </g>
      <rect x="11" y="16" width="108" height="48" rx="5" fill="#9a8048" opacity="0.15"/>
      <rect x="16" y="21" width="98" height="38" rx="3" fill="none" stroke="#9a8048" stroke-width="0.7" opacity="0.45"/>
      <rect x="22" y="27" width="86" height="26" rx="2" fill="none" stroke="#9a8048" stroke-width="0.4" opacity="0.35"/>
      <circle cx="65" cy="40" r="11" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.5"/>
      <circle cx="65" cy="40" r="5" fill="#9a8048" opacity="0.3"/>
      <g fill="#c9a84c" opacity="0.55">
        <polygon points="28,29 32,33 28,37 24,33"/>
        <polygon points="102,29 106,33 102,37 98,33"/>
        <polygon points="28,43 32,47 28,51 24,47"/>
        <polygon points="102,43 106,47 102,51 98,47"/>
      </g>
    </svg>
  </div>

  <div class="z scene-label" id="scene-label"></div>

  <div class="z narration-box">
    <span id="narration-text">铺开你的魔毯……</span>
  </div>

  <!-- Speaking bars -->
  <div class="z" id="bars">
    <div class="bar" style="animation-delay:0s"></div>
    <div class="bar" style="animation-delay:0.12s"></div>
    <div class="bar" style="animation-delay:0.24s"></div>
    <div class="bar" style="animation-delay:0.36s"></div>
    <div class="bar" style="animation-delay:0.48s"></div>
  </div>

  <!-- Flying -->
  <div class="z" id="flying-wrap">
    <div class="flying-text">✦ &nbsp; 魔毯飞行中 &nbsp; ✦</div>
  </div>

  <!-- Interaction -->
  <div class="z" id="interact">
    <div class="cta" id="cta-text">选择一段旅程，或告诉魔毯你想去哪里</div>
    <div id="transcript-line"></div>
    <div class="chips" id="next-chips" style="margin-top:0;margin-bottom:20px"></div>
    <div class="mic-wrap">
      <div class="mic-ring" id="mic-ring"></div>
      <button class="mic-btn" id="mic-btn" aria-label="语音输入">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="13" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>
      </button>
    </div>
    <div class="type-link" id="type-link">或者，用文字告诉魔毯 ›</div>
    <div class="type-row" id="type-row">
      <input id="type-input" placeholder="你想去哪里…" maxlength="30">
      <button id="type-go">出发</button>
    </div>
    <div class="bp-grid" id="bp-grid"></div>
    <div class="chips">
      <div class="chip" onclick="goTo('撒哈拉沙漠的星夜')">撒哈拉星夜</div>
      <div class="chip" onclick="goTo('北极看极光')">北极极光</div>
      <div class="chip" onclick="goTo('花果山见孙悟空')">花果山</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- 声音设置 -->
<div id="settings-btn" title="声音设置">♪</div>
<div id="settings-panel">
  <div class="set-row">
    <div class="set-label"><span>背景音乐</span><span id="vol-amb-val">70%</span></div>
    <input type="range" id="vol-amb" min="0" max="100" value="70">
  </div>
  <div class="set-row">
    <div class="set-label"><span>旁白人声</span><span id="vol-voice-val">100%</span></div>
    <input type="range" id="vol-voice" min="0" max="100" value="100">
  </div>
  <div class="set-row">
    <div class="set-label"><span>音乐风格</span></div>
    <div class="style-opts" id="style-opts"></div>
  </div>
  <div class="set-row">
    <div class="set-label"><span>句间停顿</span><span id="pause-val">100%</span></div>
    <input type="range" id="pause-scale" min="40" max="220" value="100">
  </div>
  <div class="set-row set-toggle">
    <div class="set-label"><span>自动聆听（说完旁白自动开麦）</span></div>
    <input type="checkbox" id="auto-listen-toggle" checked>
  </div>
  <div class="set-row">
    <div class="set-label"><span>旁白音色（点击选定 · 试听需已开通大模型语音）</span></div>
    <div class="voice-list" id="voice-list"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   蓝本：5 段固定开场（上天 / 下海 / 登山 / 神话 / 科幻）
   固定文案 → 语音可预取缓存 → 点击零延时播放
   pauseMs = 句间停顿；emotion 需音色支持多情感，不支持会自动降级
════════════════════════════════════════ */
const BLUEPRINTS = [
  {
    id: 'sky', emoji: '☁️', title: '御风上天', sub: '云海 · 极光', ambient: 'wind',
    emotion: null, speed: 0.9, pauseMs: 700,
    sentences: [
      '抓稳了，魔毯要起飞了。',
      '风从耳边掠过，城市在脚下缩成一片闪烁的灯海。',
      '你们一路向上，穿过微凉的云层，云絮像棉花糖一样从指尖滑过。',
      '再往上，天空由湛蓝转为深紫，星星一颗一颗亮起来。',
      '极光在你身旁舒展，绿色与紫色的光带，像丝绸一样缓缓流动。',
      '你伸出手，星光落在掌心，微微发烫。',
      '魔毯停在平流层的边缘，世界安静得只剩你的呼吸。',
      '想去更高的地方，还是俯瞰这颗蓝色星球？告诉魔毯。',
    ],
    choices: ['再往上，冲出大气层', '俯冲掠过灯火的城市', '追着极光飞一程'],
  },
  {
    id: 'sea', emoji: '🌊', title: '深海龙宫', sub: '鲸歌 · 琉璃', ambient: 'ocean',
    emotion: null, speed: 0.88, pauseMs: 800,
    sentences: [
      '深吸一口气，魔毯化作一叶扁舟，潜入海面。',
      '阳光在头顶碎成一片摇晃的金箔，越往下，海水越蓝，越静。',
      '成群的发光水母从你身边飘过，像一盏一盏温柔的小灯笼。',
      '远处传来鲸鱼低沉的歌声，穿过整片海洋，落进你的胸口。',
      '珊瑚宫殿在幽蓝中亮起，龙宫的琉璃瓦，闪着珍珠的光。',
      '水流托着你，像被大海轻轻抱住。',
      '你在这片温柔的深蓝里，慢慢下沉，慢慢放松。',
      '想去敲开龙宫的大门吗？告诉魔毯。',
    ],
    choices: ['敲开龙宫的大门', '跟着鲸鱼去更深处', '浮上月光下的海面'],
  },
  {
    id: 'mountain', emoji: '🏔️', title: '雪山之巅', sub: '日出 · 经幡', ambient: 'wind',
    emotion: null, speed: 0.9, pauseMs: 700,
    sentences: [
      '系紧披风，我们去看雪山日出。',
      '魔毯贴着山脊缓缓爬升，松林的清香混着雪的凉意，扑面而来。',
      '云海在脚下翻涌，八千米的峰顶，就在前方。',
      '第一缕阳光越过山脊，雪坡瞬间被染成金红色。',
      '风很轻，经幡在远处哗啦作响，像大地的呼吸。',
      '你坐在世界之巅，胸腔里满是清冽干净的空气。',
      '天地辽阔，而你安然。',
      '想沿着冰川继续前行吗？告诉魔毯。',
    ],
    choices: ['沿着冰川继续前行', '在峰顶多坐一会儿', '飞去神秘的圣湖'],
  },
  {
    id: 'myth', emoji: '🌙', title: '月宫奇遇', sub: '嫦娥 · 桂香', ambient: 'space',
    emotion: null, speed: 0.88, pauseMs: 800,
    sentences: [

/* ── Stars ── */
const canvas = document.getElementById('star-canvas');
const ctx2d  = canvas.getContext('2d');
let stars    = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({ length: 130 }, () => ({
    x:     Math.random() * canvas.width,
    y:     Math.random() * canvas.height,
    r:     Math.random() * 1.4 + 0.3,
    phase: Math.random() * Math.PI * 2,
    spd:   0.25 + Math.random() * 0.55,
  }));
}
function drawStars(ts) {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  const t = ts / 1000;
  stars.forEach(s => {
    const a = 0.22 + 0.55 * (0.5 + 0.5 * Math.sin(t * s.spd + s.phase));
    ctx2d.beginPath();
    ctx2d.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx2d.fillStyle = `rgba(255,255,255,${a})`;
    ctx2d.fill();
  });
  requestAnimationFrame(drawStars);
}
resizeCanvas();
requestAnimationFrame(drawStars);
window.addEventListener('resize', resizeCanvas);

/* ════════════════════════════════════════
   环境音：冥想风格和弦铺底（正弦波五声音阶 + 呼吸式起伏）
   所有停止都带 0.9s 淡出，杜绝爆音/吱吱声
════════════════════════════════════════ */
let audioCtx    = null;
let activeNodes = [];
let ambMaster   = null;
let ambLevel    = 0;

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function mkNoise(ac, dur) {
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
// 场景总线：淡入进场
function ambientBus(level, fadeSec) {
  const ac  = getAC();
  const bus = ac.createGain();
  bus.gain.setValueAtTime(0.0001, ac.currentTime);
  bus.gain.linearRampToValueAtTime(Math.max(0.0001, level * ambVol), ac.currentTime + fadeSec);
  bus.connect(ac.destination);
  ambMaster = bus;
  ambLevel  = level;
  return bus;
}
// 淡出后再停振荡器，避免瞬间掐断产生的咔哒/吱吱声
function stopAmbient() {
  const nodes = activeNodes;
  const bus   = ambMaster;
  activeNodes = [];
  ambMaster   = null;
  if (bus) {
    const ac = getAC();
    try {
      bus.gain.cancelScheduledValues(ac.currentTime);
      bus.gain.setValueAtTime(Math.max(bus.gain.value, 0.0001), ac.currentTime);
      bus.gain.linearRampToValueAtTime(0.0001, ac.currentTime + 0.9);
    } catch (e) {}
  }
  setTimeout(() => {
    nodes.forEach(n => { try { n.stop(); } catch (e) {} });
    if (bus) { try { bus.disconnect(); } catch (e) {} }
  }, 1000);
}
// 识别语音时压低环境音（喇叭声会漏进手机麦克风，导致识别刚启动就被判定结束）
let isDucked = false;
function duckAmbient(on) {
  isDucked = on;
  if (!ambMaster) return;
  const ac = getAC();
  try {
    ambMaster.gain.cancelScheduledValues(ac.currentTime);
    ambMaster.gain.setValueAtTime(Math.max(ambMaster.gain.value, 0.0001), ac.currentTime);
    ambMaster.gain.linearRampToValueAtTime(on ? 0.015 * ambVol : Math.max(0.0001, (ambLevel || 0.12) * ambVol), ac.currentTime + 0.4);
  } catch (e) {}
}
// 和弦铺底：每个音 = 双正弦微失谐（温暖感）+ 极慢 LFO 呼吸起伏
function pad(bus, freqs, lvl) {
  const ac = getAC();
  freqs.forEach((f0, i) => {
    const o1  = ac.createOscillator(); o1.type = 'sine'; o1.frequency.value = f0;
    const o2  = ac.createOscillator(); o2.type = 'sine'; o2.frequency.value = f0 * 1.004;
    const g   = ac.createGain(); g.gain.value = lvl / (1 + i * 0.35);
    const lfo = ac.createOscillator(); lfo.frequency.value = 0.04 + i * 0.021;
    const lg  = ac.createGain(); lg.gain.value = g.gain.value * 0.45;
    lfo.connect(lg); lg.connect(g.gain);
    o1.connect(g); o2.connect(g); g.connect(bus);
    o1.start(); o2.start(); lfo.start();
    activeNodes.push(o1, o2, lfo);
  });
}
// 柔和气息声：深度低通的噪声，可带缓慢起伏
function airNoise(bus, cutoff, lvl, lfoRate) {
  const ac  = getAC();
  const src = ac.createBufferSource(); src.buffer = mkNoise(ac, 6); src.loop = true;
  const f   = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = cutoff; f.Q.value = 0.4;
  const g   = ac.createGain(); g.gain.value = lvl;
  if (lfoRate) {
    const lfo = ac.createOscillator(); lfo.frequency.value = lfoRate;
    const lg  = ac.createGain(); lg.gain.value = lvl * 0.6;
    lfo.connect(lg); lg.connect(g.gain); lfo.start(); activeNodes.push(lfo);
  }
  src.connect(f); f.connect(g); g.connect(bus);
  src.start(); activeNodes.push(src);
}
// 音乐风格系数：pad=和弦铺底 noise=自然音效 arp=拨弦琶音 gap=琶音间隔
const STYLE_CFG = {
  classical: { pad: 0.55, noise: 0.8, arp: 1.5, gap: 0.55 },   // 轻盈古典：琶音为主
  nature:    { pad: 0.30, noise: 1.5, arp: 0.7, gap: 1.2 },    // 自然之声：风浪水为主
  ambient:   { pad: 1.40, noise: 1.0, arp: 0,   gap: 1 },      // 纯氛围：铺底为主
};
function styleCfg() { return STYLE_CFG[musicStyle] || STYLE_CFG.classical; }
let lastAmbientKey = null;

// 拨弦音（竖琴/古筝质感）：三角波 + 快起音长衰减
function pluck(bus, freq, vol) {
  const ac = getAC();
  const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(Math.max(0.0002, vol), ac.currentTime + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 2.4);
  o.connect(g); g.connect(bus);
  o.start(); o.stop(ac.currentTime + 2.5);
}
// 琶音器：随机间隔轻拨音阶里的音，古典轻盈感；场景切换自动停止
function arp(bus, notes, minGap, maxGap, vol) {
  const tick = () => {
    if (ambMaster !== bus) return;
    const n = notes[Math.floor(Math.random() * notes.length)];
    pluck(bus, n, vol);
    if (Math.random() < 0.3) setTimeout(() => { if (ambMaster === bus) pluck(bus, n * 2, vol * 0.45); }, 200);
    setTimeout(tick, minGap + Math.random() * (maxGap - minGap));
  };
  setTimeout(tick, 1200);
}
// 水流咕噜声：带通噪声 + 双 LFO（快速水泡感 + 缓慢流向变化）
function burble(bus, lvl) {
  const ac  = getAC();
  const src = ac.createBufferSource(); src.buffer = mkNoise(ac, 6); src.loop = true;
  const f   = ac.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1100; f.Q.value = 1.6;
  const g   = ac.createGain(); g.gain.value = lvl;
  const l1  = ac.createOscillator(); l1.frequency.value = 1.7;
  const lg1 = ac.createGain(); lg1.gain.value = lvl * 0.55;
  l1.connect(lg1); lg1.connect(g.gain);
  const l2  = ac.createOscillator(); l2.frequency.value = 0.31;
  const lg2 = ac.createGain(); lg2.gain.value = 350;
  l2.connect(lg2); lg2.connect(f.frequency);
  src.connect(f); f.connect(g); g.connect(bus);
  src.start(); l1.start(); l2.start(); activeNodes.push(src, l1, l2);
}
// 天空/御风：风声 + 明亮五声琶音（轻盈）
function playWind() {
  if (musicStyle === 'off') return;
  const S = styleCfg();
  const bus = ambientBus(0.16, 3);
  pad(bus, [110, 164.8, 220, 329.6], 0.09 * S.pad);
  airNoise(bus, 240, 0.11 * S.noise, 0.05);
  if (S.arp) arp(bus, [440, 493.9, 554.4, 659.3, 740], 2200 * S.gap, 5000 * S.gap, 0.12 * S.arp);
}
// 海洋：浪的涌动 + 低音偶尔轻拨
function playOcean() {
  if (musicStyle === 'off') return;
  const S = styleCfg();
  const bus = ambientBus(0.16, 3.5);
  pad(bus, [82.4, 123.5, 164.8, 246.9], 0.11 * S.pad);
  airNoise(bus, 140, 0.17 * S.noise, 0.07);
  if (S.arp) arp(bus, [220, 246.9, 293.7, 329.6], 3500 * S.gap, 7000 * S.gap, 0.08 * S.arp);
}
// 星空：清冷微光 + 极稀疏的高音星子
function playSpace() {
  if (musicStyle === 'off') return;
  const S = styleCfg();
  const bus = ambientBus(0.11, 4);
  pad(bus, [130.8, 196, 261.6, 392, 523.3], 0.09 * S.pad);
  if (S.arp) arp(bus, [1046.5, 1174.7, 1318.5, 1568], 4000 * S.gap, 8500 * S.gap, 0.05 * S.arp);
}
// 溪流/泉水：潺潺水声 + 高音轻拨
function playStream() {
  if (musicStyle === 'off') return;
  const S = styleCfg();
  const bus = ambientBus(0.16, 2.5);
  pad(bus, [146.8, 220, 293.7], 0.07 * S.pad);
  burble(bus, 0.10 * S.noise);
  if (S.arp) arp(bus, [587.3, 659.3, 784, 880], 2800 * S.gap, 6000 * S.gap, 0.09 * S.arp);
}
// 沙漠：空旷的风 + 稀疏驼铃般的轻拨
function playDesert() {
  if (musicStyle === 'off') return;
  const S = styleCfg();
  const bus = ambientBus(0.15, 3);
  pad(bus, [73.4, 110, 146.8, 220], 0.09 * S.pad);
  airNoise(bus, 420, 0.10 * S.noise, 0.04);
  if (S.arp) arp(bus, [293.7, 349.2, 440, 523.3], 3000 * S.gap, 6500 * S.gap, 0.09 * S.arp);
}
// 打斗/紧张：小二度摩擦音 + 心跳般的低鼓
function playBattle() {
  if (musicStyle === 'off') return;
  const S = styleCfg();
  const bus = ambientBus(0.15, 1.5);
  pad(bus, [98, 103.8, 146.8, 196], 0.11 * S.pad);
  airNoise(bus, 300, 0.07 * S.noise, 0.12);
  const ac = getAC();
  const drum = () => {
    if (ambMaster !== bus) return;   // 场景已切换，停止心跳
    const o = ac.createOscillator();
    o.frequency.setValueAtTime(90, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(45, ac.currentTime + 0.25);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.5, ac.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.35);
    o.connect(g); g.connect(bus);
    o.start(); o.stop(ac.currentTime + 0.4);
    setTimeout(drum, 850);
  };
  setTimeout(drum, 600);
}
function pickAmbient(key) {
  lastAmbientKey = key;
  if (key === 'battle' || /打斗|战斗|激战|妖|魔王|决斗|追逐|风暴|雷电|龙卷|危机|紧张/.test(key)) playBattle();
  else if (key === 'desert' || /沙漠|大漠|戈壁|绿洲|驼铃|撒哈拉|敦煌/.test(key)) playDesert();
  else if (key === 'stream' || /溪|泉|流水|瀑布|河|涧/.test(key)) playStream();
  else if (key === 'space' || /月|太空|星|天宫|仙|宇宙|广寒|嫦|空间站|土星|银河/.test(key)) playSpace();
  else if (key === 'sea' || key === 'ocean' || /海|龙宫|深潜|鲸|珊瑚/.test(key)) playOcean();
  else playWind();
}
// 起飞"呼——"过渡音效（柔化版）：低通扫频，音量克制
function playWhoosh() {
  const ac  = getAC();
  const src = ac.createBufferSource(); src.buffer = mkNoise(ac, 3);
  const f   = ac.createBiquadFilter(); f.type = 'lowpass'; f.Q.value = 0.7;
  f.frequency.setValueAtTime(150, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(850, ac.currentTime + 1.2);
  f.frequency.exponentialRampToValueAtTime(180, ac.currentTime + 2.7);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.1, ac.currentTime + 0.8);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 2.9);
  src.connect(f); f.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime + 3);
}

/* ════════════════════════════════════════
   TTS：Cache Storage 缓存 + 分句流水线
   每句 WebAudio 播放（50ms 淡入 / 80ms 淡出，无爆音）
   句间自然停顿 pauseMs（默认 600ms）
════════════════════════════════════════ */
const TTS_CACHE = 'mc-tts-v2';   // 换音色/情感后请修改版本号使缓存失效
let cacheApi = null;
async function getCache() {
  if (cacheApi !== null) return cacheApi;
  try { cacheApi = 'caches' in window ? await caches.open(TTS_CACHE) : false; }
  catch (e) { cacheApi = false; }
  return cacheApi;
}
const memCache = new Map();  // Cache Storage 不可用时的内存兜底

function cacheKey(text, opts) {
  return '/tts-cache/' + encodeURIComponent(`${chosenVoice}|${opts.emotion || ''}|${opts.speed || ''}|${text}`);
}

// 取一句语音：缓存命中直接返回，否则请求 /api/tts 并写入缓存
async function ttsBlob(text, opts = {}) {
  const key = cacheKey(text, opts);
  if (memCache.has(key)) return memCache.get(key);
  const cache = await getCache();
  if (cache) {
    const hit = await cache.match(key);
    if (hit) { const b = await hit.blob(); memCache.set(key, b); return b; }
  }
  const res = await fetch('/api/tts', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ text, emotion: opts.emotion || undefined, speed: opts.speed || undefined, voice: chosenVoice || undefined }),
  });
  if (!res.ok) {
    let detail = '';
    try { detail = (await res.json()).detail || ''; } catch (e) {}
    throw new Error(`TTS ${res.status} ${detail}`);
  }
  const blob = await res.blob();
  memCache.set(key, blob);
  if (cache) { try { await cache.put(key, new Response(blob, { headers: { 'Content-Type': 'audio/mpeg' } })); } catch (e) {} }
  return blob;
}

// WebAudio 播放单句：带淡入淡出；解码失败退回 HTMLAudio
async function playBlob(blob) {
  const ac = getAC();
  try {
    const audioBuf = await ac.decodeAudioData(await blob.arrayBuffer());
    return await new Promise(resolve => {
      const src = ac.createBufferSource(); src.buffer = audioBuf;
      const g = ac.createGain();
      const t = ac.currentTime, d = audioBuf.duration;
      const vv = Math.max(0.0001, voiceVol);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vv, t + 0.05);
      const fadeAt = Math.max(t + 0.05, t + d - 0.08);
      g.gain.setValueAtTime(vv, fadeAt);
      g.gain.linearRampToValueAtTime(0.0001, t + d);
      src.connect(g); g.connect(ac.destination);
      currentSrc = src;
      src.onended = () => { currentSrc = null; try { g.disconnect(); } catch (e) {} resolve(); };
      src.start();
    });
  } catch (e) {
    return new Promise(resolve => {
      const url = URL.createObjectURL(blob);
      const a = new Audio(url); currentAudio = a;
      a.volume = Math.max(0, Math.min(1, voiceVol));
      const done = () => { URL.revokeObjectURL(url); currentAudio = null; resolve(); };
      a.onended = done; a.onerror = done; a.play().catch(done);
    });
  }
}
// 可被打断的停顿
function pauseFor(ms, token) {
  return new Promise(r => setTimeout(() => r(token === speakToken), ms));
}

// 分句流水线：播第 i 句时并行预取第 i+1 句 → 首句到手即开播
function speakSentences(sentences, opts = {}) {
  return new Promise(resolve => {
    const token   = ++speakToken;
    const pauseMs = (opts.pauseMs || 600) * pauseScale;
    const fetches = new Array(sentences.length).fill(null);
    let warned    = false;
    const ensure  = i => {
      if (i < sentences.length && !fetches[i]) {
        fetches[i] = ttsBlob(sentences[i], opts).catch(err => {
          console.error('TTS error:', err);
          if (!warned) { warned = true; toast('语音服务未响应：' + err.message.slice(0, 60)); }
          return null;
        });
      }
      return fetches[i];
    };
    ensure(0);
    let idx = 0;
    async function next() {
      if (token !== speakToken) return resolve(false);      // 被新旅程打断
      if (idx >= sentences.length) return resolve(true);
      const blob = await ensure(idx);
      if (token !== speakToken) return resolve(false);
      ensure(idx + 1);                                       // 边播边取下一句
      if (opts.onSentence) opts.onSentence(idx);
      if (blob) await playBlob(blob);
      if (token !== speakToken) return resolve(false);
      idx++;
      if (idx < sentences.length) {                          // 句间自然停顿
        const alive = await pauseFor(pauseMs, token);
        if (!alive) return resolve(false);
      }
      next();
    }
    next();
  });
}
function stopSpeaking() {
  speakToken++;
  if (currentSrc)   { try { currentSrc.stop(); }   catch (e) {} currentSrc   = null; }
  if (currentAudio) { try { currentAudio.pause(); } catch (e) {} currentAudio = null; }
}

// 逐句点亮文字：已读的亮、未读的暗
function renderProgress(sentences, uptoIdx) {
  nt.className = '';
  nt.innerHTML = sentences.map((s, i) =>
    `<span class="${i <= uptoIdx ? 'said' : 'unsaid'}">${s}</span>`
  ).join('');
}

/* ── 后台预取：过渡语 + 全部蓝本（顺序请求，避免打爆接口）── */
async function prefetchAll() {
  const jobs = [];
  BLUEPRINTS.forEach(bp => jobs.push({ list: bp.sentences, opts: { emotion: bp.emotion, speed: bp.speed }, bp }));
  jobs.push({ list: TRANSITION_SENTENCES, opts: {} });
  for (const job of jobs) {
    let ok = true;
    for (const s of job.list) {
      try { await ttsBlob(s, job.opts); } catch (e) { ok = false; break; }
    }
    if (ok && job.bp) {
      const el = document.querySelector(`[data-bp="${job.bp.id}"]`);
      if (el) el.classList.add('cached');   // 绿点 = 已缓存可秒开
    }
  }
}

// 蓝本旅程：文案固定、语音已预取 → 点击即播，零等待
async function startBlueprint(bp) {

// 自由目的地：过渡语（已缓存，秒播）掩盖 Claude 生成 + 首句合成的等待
async function goTo(dest) {
  if (phase === 'flying') return;
  stopSpeaking();
  stopVoice();
  trLine.textContent = '';
  nextChips.innerHTML = '';

  stopAmbient();
  playWhoosh();
  playWind();
  sl.textContent = '';
  nt.className = '';
  nt.textContent = `魔毯感受到你的心意，带着你向「${dest}」飞去……`;
  setPhase('speaking');

  // 并行：播过渡语 ‖ 请求旁白文字
  const narratePromise = fetch('/api/narrate', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ destination: dest, context: lastJourneyText || undefined }),
  }).then(r => r.json()).catch(() => null);

  await speakSentences(TRANSITION_SENTENCES, { pauseMs: 500 });

  setPhase('flying');
  const data = await narratePromise;
  const text = (data && data.text) || '魔毯在云端轻轻飘荡，带你感受宁静……你想去哪里，再告诉魔毯一次好吗？';
  if (data && data.error) toast('旁白生成失败：' + (data.detail || data.error));

  const sentences = splitSentences(text);
  lastJourneyText = text;

  stopAmbient();
  pickAmbient((data && data.mood) || dest);
  sl.textContent = `· 当前目的地：${dest} ·`;
  setPhase('speaking');
  renderProgress(sentences, -1);

  const finished = await speakSentences(sentences, {
    pauseMs: 650,
    onSentence: i => renderProgress(sentences, i),
  });
  if (finished) {
    showChoices(data && data.choices);
    ctaText.textContent = '直接开口说，或点一个走向……';
    setPhase('listening');
    maybeAutoListen();
  }
}

// 按中文标点分句，过短的合并到下一句，保证每次 TTS 请求不至于太碎
function splitSentences(text) {
  const parts = text.replace(/\s+/g, '').split(/(?<=[。！？；])|(?<=…)(?!…)/).filter(Boolean);
  const out = [];
  let buf = '';
  for (const p of parts) {
    buf += p;
    if (buf.length >= 8) { out.push(buf); buf = ''; }
  }
  if (buf) { if (out.length) out[out.length - 1] += buf; else out.push(buf); }
  return out;
}

/* ── Voice Input ──
   双通道：优先浏览器 Web Speech（桌面 Chrome/Edge 免费秒识）；
   识别服务不可用时（小米浏览器、国内安卓 Chrome 等连不上 Google 识别服务）

   两者都不行时弹出文字输入。识别期间压低环境音。 */

function micClick() {

function setMicOn(on) {

/* —— 通道一：浏览器 Web Speech —— */
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  stopSpeaking();
  duckAmbient(true);
  recogActive  = true;
  recogRestart = 0;
  clearTimeout(voiceTimer);
  voiceTimer = setTimeout(stopVoice, 15000);  // 最长听 15 秒

  recog = new SR();
  recog.lang           = 'zh-CN';
  recog.continuous     = true;    // false 在手机上会于短暂静音后立即结束
  recog.interimResults = true;

  recog.onstart = () => setMicOn(true);
  recog.onresult = e => {
    let finalText = '', interim = '';
    for (const r of e.results) {
      if (r.isFinal) finalText += r[0].transcript;
      else           interim   += r[0].transcript;
    }
    trLine.textContent = `“${finalText || interim}”`;
    if (finalText.trim()) {
      const t = finalText.trim();
      stopVoice();
      trLine.textContent = '';
      goTo(t);
    }
  };
  recog.onerror = e => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed' ||
        e.error === 'network' || e.error === 'language-not-supported') {
      // 浏览器识别服务不可用 → 永久切换到服务端识别（录音上传火山引擎）
      sttMode = 'server';
      try { localStorage.setItem('mc-stt', 'server'); } catch (e2) {}
      stopVoice();
      startRecorder();
    }
    // no-speech / aborted 等交给 onend 自动重启
  };
  recog.onend = () => {
    if (!recogActive) return;
    if (recogRestart < 6) {       // 静默重启续听
      recogRestart++;
      try { recog.start(); }
      catch (err) { setTimeout(() => { try { recog.start(); } catch (e2) { stopVoice(); } }, 200); }
    } else {
      stopVoice();
    }
  };
  try { recog.start(); } catch (e) { stopVoice(); }
}
function stopVoice() {
  recogActive = false;
  clearTimeout(voiceTimer);
  if (recog) { const r = recog; recog = null; r.onend = null; r.onresult = null; try { r.stop(); } catch (e) {} }
  if (recording || recStream) { teardownRecorder(); trLine.textContent = ''; }
  setMicOn(false);
  duckAmbient(false);
}

/* —— 通道二：录音 → 火山引擎大模型识别 —— */
async function startRecorder() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
  } catch (e) {
    toast('无法使用麦克风，试试文字输入吧');
    showTypeInput();
    return;
  }
  stopSpeaking();
  duckAmbient(true);
  recStream = stream;
  recChunks = [];
  recording = true;
  recCtx = new (window.AudioContext || window.webkitAudioContext)();
  const srcNode = recCtx.createMediaStreamSource(stream);
  recNode = recCtx.createScriptProcessor(4096, 1, 1);

  // 语音端点检测（VAD）：开口后停顿 ~1.5 秒自动结束，无需再点按钮
  const started  = Date.now();
  let   noiseSum = 0, noiseCnt = 0, noiseFloor = null;
  let   spoke    = false, lastLoud = 0;
  recNode.onaudioprocess = ev => {
    if (!recording) return;
    const d = ev.inputBuffer.getChannelData(0);
    recChunks.push(new Float32Array(d));
    let sum = 0;
    for (let i = 0; i < d.length; i += 8) sum += d[i] * d[i];
    const rms = Math.sqrt(sum / (d.length / 8));
    const now = Date.now();
    if (now - started < 450) { noiseSum += rms; noiseCnt++; return; }   // 前 0.45s 采环境噪声基线
    if (noiseFloor === null) noiseFloor = noiseSum / Math.max(1, noiseCnt);
    const threshold = Math.max(noiseFloor * 2.8, 0.012);
    if (rms > threshold) {
      if (!spoke) trLine.textContent = '（听到了，请继续……说完停顿一下即可）';
      spoke = true; lastLoud = now;
    }
    if (spoke  && now - lastLoud > 1500) finishRecorder();              // 说完停顿 1.5s → 自动结束
    if (!spoke && now - started  > 9000) { teardownRecorder(); trLine.textContent = ''; toast('没有听到声音，再试一次？'); }
  };
  const mute = recCtx.createGain(); mute.gain.value = 0;
  srcNode.connect(recNode); recNode.connect(mute); mute.connect(recCtx.destination);
  setMicOn(true);
  trLine.textContent = '（正在聆听……直接开口说就好）';
  clearTimeout(voiceTimer);
  voiceTimer = setTimeout(finishRecorder, 30000);   // 兜底上限 30 秒
}
function teardownRecorder() {
  recording = false;
  clearTimeout(voiceTimer);
  if (recNode)   { try { recNode.disconnect(); } catch (e) {} recNode = null; }
  if (recCtx)    { try { recCtx.close(); }      catch (e) {} recCtx  = null; }
  if (recStream) { recStream.getTracks().forEach(t => { try { t.stop(); } catch (e) {} }); recStream = null; }
  setMicOn(false);
  duckAmbient(false);
}
async function finishRecorder() {
  if (!recording) return;
  const sr     = recCtx.sampleRate;
  const chunks = recChunks; recChunks = [];
  teardownRecorder();
  let len = 0; chunks.forEach(c => len += c.length);
  if (len < sr * 0.4) { trLine.textContent = ''; toast('没有听清，再试一次？'); return; }
  const pcm = new Float32Array(len);
  { let off = 0; chunks.forEach(c => { pcm.set(c, off); off += c.length; }); }
  trLine.textContent = '魔毯正在理解你的话……';
  const wav = encodeWav16k(pcm, sr);
  let b64 = '';
  { const bytes = new Uint8Array(wav); const step = 0x8000;
    for (let i = 0; i < bytes.length; i += step) b64 += String.fromCharCode.apply(null, bytes.subarray(i, i + step));
    b64 = btoa(b64); }
  try {
    const res  = await fetch('/api/asr', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ audio: b64, format: 'wav' }),
    });
    const data = await res.json();
    if (res.ok && data.text && data.text.trim()) {
      trLine.textContent = '';
      goTo(data.text.trim());
    } else {
      trLine.textContent = '';
      toast('识别失败：' + ((data && (data.detail || data.error)) || '未知错误'));
      showTypeInput();
    }
  } catch (e) {
    trLine.textContent = '';
    toast('识别服务未响应，试试文字输入吧');
    showTypeInput();
  }
}
// Float32 PCM → 16kHz 16bit 单声道 WAV
function encodeWav16k(pcm, srcRate) {
  const ratio  = srcRate / 16000;
  const outLen = Math.floor(pcm.length / ratio);
  const out    = new Int16Array(outLen);
  for (let i = 0; i < outLen; i++) {
    const s = Math.max(-1, Math.min(1, pcm[Math.floor(i * ratio)] || 0));
    out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  const buf = new ArrayBuffer(44 + out.length * 2);
  const v   = new DataView(buf);
  const ws  = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  ws(0, 'RIFF'); v.setUint32(4, 36 + out.length * 2, true); ws(8, 'WAVE');
  ws(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  ws(36, 'data'); v.setUint32(40, out.length * 2, true);
  for (let i = 0; i < out.length; i++) v.setInt16(44 + i * 2, out[i], true);
  return buf;
}

/* ── 渲染蓝本卡片 ── */
const bpGrid = document.getElementById('bp-grid');
BLUEPRINTS.forEach(bp => {
  const card = document.createElement('div');
  card.className = 'bp-card';
  card.dataset.bp = bp.id;
  card.innerHTML = `<div class="bp-ready"></div><div class="bp-emoji">${bp.emoji}</div><div class="bp-title">${bp.title}</div><div class="bp-sub">${bp.sub}</div>`;
  card.onclick = () => startBlueprint(bp);
  bpGrid.appendChild(card);
});

/* ── 入口：用户手势解锁音频 → 播开场白，同时后台预取全部蓝本语音 ── */
document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('start-overlay').classList.add('hide');
  getAC().resume && getAC().resume();

  prefetchAll();   // 后台静默预取，不阻塞开场

  setPhase('speaking');
  renderProgress(INTRO_SENTENCES, -1);
  const finished = await speakSentences(INTRO_SENTENCES, {
    pauseMs: 800,
    onSentence: i => renderProgress(INTRO_SENTENCES, i),
  });
  if (finished) { setPhase('listening'); maybeAutoListen(); }
});
</script>
