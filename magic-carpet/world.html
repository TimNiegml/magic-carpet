<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮汐灯塔 · 风暴夜 — 魔毯世界</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0c0b09}
#app{min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%,#141109,#0c0b09);
  font-family:'Noto Serif SC',Georgia,serif;color:#e8d9b0;
  display:flex;flex-direction:column;align-items:center;padding:38px 22px 120px;position:relative}
.eyebrow{font-size:10px;letter-spacing:8px;color:#6a5228;font-family:sans-serif;margin-bottom:10px;text-align:center}
.title{font-size:1.5rem;font-weight:300;color:#c9a84c;letter-spacing:8px;text-align:center;margin-bottom:6px}
.logline{font-size:11px;color:#6a5228;font-family:sans-serif;letter-spacing:1px;text-align:center;max-width:520px;margin-bottom:24px;line-height:1.8}
.stage{display:flex;gap:26px;max-width:1000px;width:100%;align-items:flex-start;justify-content:center}
.left{flex:1;min-width:0;max-width:560px;display:flex;flex-direction:column}
.right{width:360px;flex-shrink:0}
.imgframe{width:100%;aspect-ratio:1/1;border:0.5px solid rgba(201,168,76,0.25);border-radius:16px;
  overflow:hidden;position:relative;background:rgba(255,255,255,0.02)}
#scene-img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s;display:block}
#scene-img.show{opacity:1}
.imgload{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  color:#6a5228;font-family:sans-serif;font-size:11px;letter-spacing:5px}
.imgload.on{display:flex;animation:blink 1.6s infinite}
.imgcap{margin-top:8px;text-align:center;font-size:9px;letter-spacing:2px;color:#5a4a28;font-family:sans-serif}
.narration{width:100%;border:0.5px solid rgba(201,168,76,0.2);border-radius:16px;
  padding:28px 30px;line-height:2.1;font-size:1.05rem;font-weight:300;min-height:150px;
  background:rgba(255,255,255,0.018);margin-bottom:20px;transition:opacity .5s;white-space:pre-wrap}
.choices{display:flex;flex-direction:column;gap:10px;width:100%}
.choice{border:0.5px solid rgba(154,128,72,0.32);background:rgba(154,128,72,0.06);color:#e8d9b0;
  border-radius:12px;padding:14px 18px;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:15px;
  letter-spacing:1px;text-align:left;transition:all .2s;position:relative}
.choice:hover{background:rgba(154,128,72,0.18);border-color:#c9a84c}
.choice .rdy{position:absolute;top:50%;right:12px;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:#4a7c4a;opacity:0;transition:opacity .4s}
.choice.ready .rdy{opacity:.85}
.type-row{display:flex;gap:8px;width:100%;margin-top:12px}
.type-row input{flex:1;background:rgba(154,128,72,0.06);border:0.5px solid rgba(154,128,72,0.3);
  border-radius:12px;color:#e8d9b0;font-family:'Noto Serif SC',serif;font-size:14px;padding:12px 14px;outline:none}
.type-row button{background:rgba(154,128,72,0.15);border:0.5px solid #9a8048;color:#c9a84c;border-radius:12px;
  padding:0 20px;cursor:pointer;font-family:'Noto Serif SC',serif;letter-spacing:2px}
.ending{text-align:center;color:#c9a84c;letter-spacing:6px;font-size:1.1rem;margin:20px 0}
#overlay{position:fixed;inset:0;z-index:50;background:rgba(12,11,9,0.94);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .8s}
#overlay.hide{opacity:0;pointer-events:none}
.start-btn{border:0.5px solid #9a8048;background:rgba(154,128,72,0.1);color:#c9a84c;
  font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:6px;padding:16px 44px;border-radius:40px;cursor:pointer}
.start-btn:hover{background:rgba(154,128,72,0.25)}
#bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(14,12,9,0.92);
  border-top:0.5px solid rgba(154,128,72,0.25);padding:12px 18px;display:flex;align-items:center;gap:14px;
  font-family:sans-serif;font-size:11px;color:#9a8048;letter-spacing:1px;flex-wrap:wrap;justify-content:center}
#bar input[type=range]{accent-color:#c9a84c;width:120px}
#bar .btn{border:0.5px solid rgba(154,128,72,0.4);border-radius:16px;padding:6px 14px;cursor:pointer;color:#9a8048}
#bar .btn:hover{color:#c9a84c;border-color:#c9a84c}
#bar label{display:flex;align-items:center;gap:5px;cursor:pointer}
#bar input[type=checkbox]{accent-color:#c9a84c;width:14px;height:14px;cursor:pointer}
.foot{margin-top:30px;font-size:10px;letter-spacing:1.5px;color:#5a4a28;font-family:sans-serif;text-align:center}
.thinking{font-size:11px;letter-spacing:4px;color:#6a5228;font-family:sans-serif;text-align:center;margin:0 0 14px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:.9}}
@media(max-width:900px){ .stage{flex-direction:column;align-items:center} .right{width:100%;max-width:560px;order:-1} }
</style>
</head>
<body>
<div id="app">
  <div class="eyebrow">HOFFMAN · 魔毯世界</div>
  <div class="title">潮汐灯塔 · 风暴夜</div>
  <div class="logline">风暴将至的孤岛旧灯塔，一艘船正驶向礁石，而今夜每个人都藏着一件事。你被困在这里，成了今夜的关键。</div>
  <div class="stage">
    <div class="left">
      <div class="narration" id="narration">铺开你的魔毯……</div>
      <div id="thinking" class="thinking" style="display:none">✦ 世界在低语 ✦</div>
      <div class="choices" id="choices"></div>
      <div class="type-row" id="type-row" style="display:none">
        <input id="type-input" placeholder="或者，说出你想做的事…" maxlength="40">
        <button id="type-go">出发</button>
      </div>
    </div>
    <div class="right">
      <div class="imgframe">
        <img id="scene-img" alt="">
        <div class="imgload" id="imgload">绘 制 中</div>
      </div>
      <div class="imgcap">油画插画 · Seedream</div>
    </div>
  </div>
  <div class="foot">创意版权归属「活满」所有 · 贡献人：炜仔 及活满全体工作人员</div>
</div>

<div id="bar">
  <span>意外程度</span>
  <input type="range" id="surprise" min="0" max="100" value="40">
  <span id="surprise-val">40</span>
  <label><input type="checkbox" id="prefetch" checked>预生成</label>
  <label><input type="checkbox" id="imgon" checked>配图</label>
  <span class="btn" id="reroll">换一种命运</span>
  <span class="btn" id="restart">重新开始</span>
  <span id="seed-label"></span>
</div>

<div id="overlay">
  <div class="eyebrow">潮汐灯塔 · 风暴夜</div>
  <button class="start-btn" id="start-btn">轻触魔毯 · 进入这一夜</button>
  <div style="font-size:10px;letter-spacing:3px;color:#6a5228;font-family:sans-serif">戴上耳机，调暗灯光</div>
</div>

<script>
const $ = id => document.getElementById(id);
let state = null, busy = false;
let seed = Math.floor(Math.random()*1e6);
let surprise = 40, prefetchOn = true, imgOn = true;
let pf = new Map();

$('surprise').addEventListener('input', e => { surprise = +e.target.value; $('surprise-val').textContent = surprise; if (state) state.params.surprise = surprise; });
$('prefetch').addEventListener('change', e => { prefetchOn = e.target.checked; if (!prefetchOn) clearPrefetch(); });
$('imgon').addEventListener('change', e => { imgOn = e.target.checked; });

function setThinking(on){ $('thinking').style.display = on ? 'block' : 'none'; }
function showSeed(){ $('seed-label').textContent = '种子 #' + seed; }

// ── 顺序音频：先读"你选的那句"，再读旁白 ──
let audio = null, queue = [], draining = false;
function stopAudio(){ queue = []; if (audio){ try{ audio.pause(); }catch(e){} audio = null; } }
function enqueueTTS(text){ if (!text) return; queue.push(text); if (!draining) drain(); }
async function drain(){
  draining = true;
  while (queue.length){
    const t = queue.shift();
    await new Promise(async res => {
      try{
        const r = await fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text: t }) });
        if (!r.ok) return res();
        audio = new Audio(URL.createObjectURL(await r.blob()));
        audio.onended = res; audio.onerror = res; audio.play().catch(res);
      }catch(e){ res(); }
    });
  }
  draining = false;
}

// ── 配图：换幕/开场/结局才请求（异步，不阻塞玩法）──
async function fetchImage(prompt){
  if (!imgOn || !prompt) return;
  const load = $('imgload'), img = $('scene-img');
  load.classList.add('on');
  try{
    const r = await fetch('/api/image', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ prompt }) });
    const d = await r.json().catch(()=>({}));
    if (r.ok && d.url){
      const pre = new Image();
      pre.onload = () => { img.classList.remove('show'); img.src = d.url; requestAnimationFrame(()=>img.classList.add('show')); load.classList.remove('on'); };
      pre.onerror = () => load.classList.remove('on');
      pre.src = d.url;
    } else { load.classList.remove('on'); }
  }catch(e){ load.classList.remove('on'); }
}

function render(data){
  $('narration').style.opacity = 0;
  setTimeout(()=>{ $('narration').textContent = data.narration; $('narration').style.opacity = 1; }, 180);
  const box = $('choices'); box.innerHTML = '';
  if (data.done){
    const e = document.createElement('div'); e.className='ending';
    e.textContent = '· ' + (data.ending?.title || '故事落幕') + ' ·';
    box.appendChild(e);
    $('type-row').style.display = 'none';
    clearPrefetch();
  } else {
    (data.choices||[]).forEach(c => {
      const b = document.createElement('div'); b.className='choice'; b.dataset.c = c;
      b.innerHTML = '<span class="rdy"></span>' + c;
      b.onclick = () => step(c);
      box.appendChild(b);
    });
    $('type-row').style.display = 'flex';
    startPrefetch(data.choices || []);
  }
  enqueueTTS(data.narration);
  if (data.image_prompt) fetchImage(data.image_prompt);
}

// ── 预生成：三选项并行预取，点中秒出 ──
function clearPrefetch(){ for (const {controller} of pf.values()){ try{ controller.abort(); }catch(e){} } pf = new Map(); }
function startPrefetch(choices){
  clearPrefetch();
  if (!prefetchOn || !state) return;
  const snap = JSON.stringify(state);
  choices.forEach(c => {
    const controller = new AbortController();
    const promise = fetch('/api/story', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ state: JSON.parse(snap), choice: c }), signal: controller.signal })
      .then(r => r.ok ? r.json() : null).catch(()=>null)
      .then(d => { if (d){ const el = document.querySelector('.choice[data-c="'+CSS.escape(c)+'"]'); if (el) el.classList.add('ready'); } return d; });
    pf.set(c, { promise, controller });
  });
}

async function callStory(payload){
  setThinking(true); busy = true;
  try{
    const r = await fetch('/api/story', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await r.json();
    if (!r.ok){ $('narration').textContent = '（引擎出错：' + (data.detail||data.error||'请重试') + '）'; return null; }
    state = data.state; render(data); return data;
  }catch(e){ $('narration').textContent = '（网络异常，请重试）'; return null; }
  finally{ setThinking(false); busy = false; }
}

async function start(){ stopAudio(); await callStory({ world_id:'storm-lighthouse', params:{ seed, surprise } }); }

async function step(choice){
  if (busy || !state) return;
  stopAudio();
  enqueueTTS(choice);
  const hit = pf.get(choice);
  for (const [c,{controller}] of pf.entries()){ if (c !== choice){ try{ controller.abort(); }catch(e){} } }
  if (hit){
    setThinking(true); busy = true;
    const data = await hit.promise;
    setThinking(false); busy = false;
    pf = new Map();
    if (data && data.state){ state = data.state; render(data); return; }
  }
  pf = new Map();
  await callStory({ state, choice });
}

$('type-go').addEventListener('click', ()=>{ const t=$('type-input').value.trim(); if(t){ $('type-input').value=''; step(t); } });
$('type-input').addEventListener('keydown', e=>{ if(e.key==='Enter'){ const t=e.target.value.trim(); if(t){ e.target.value=''; step(t);} } });
$('reroll').addEventListener('click', ()=>{ seed = Math.floor(Math.random()*1e6); showSeed(); state=null; clearPrefetch(); start(); });
$('restart').addEventListener('click', ()=>{ state=null; clearPrefetch(); start(); });
$('start-btn').addEventListener('click', ()=>{ $('overlay').classList.add('hide'); showSeed(); start(); });
showSeed();
</script>
</body>
</html>
