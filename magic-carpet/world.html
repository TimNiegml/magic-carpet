<!DOCTYPE html>
<!-- redeploy trigger -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮汐灯塔 · 风暴夜 — 魔毯世界</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0806; --bg2:#171009;
  --gold:#c9a84c; --gold-b:#e7cb82; --gold-dim:#8a7038;
  --ink:#ece0c6; --ink-dim:#7d6c4c; --line:rgba(201,168,76,0.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg)}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 90% 70% at 50% 32%, transparent 46%, rgba(0,0,0,0.5) 100%)}
#app{position:relative;z-index:2;min-height:100vh;
  background:radial-gradient(1000px 520px at 50% -8%, #1d1409, var(--bg) 70%);
  font-family:'Noto Serif SC',Georgia,serif;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;padding:44px 22px 122px}
.eyebrow{font-family:'Cinzel',serif;font-size:12px;letter-spacing:11px;color:var(--gold-dim);
  margin-bottom:14px;text-align:center;text-indent:11px}
.title{font-size:1.7rem;font-weight:600;color:var(--gold);letter-spacing:9px;text-align:center;
  text-indent:9px;text-shadow:0 2px 24px rgba(201,168,76,0.25)}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0 22px;color:var(--gold-dim)}
.divider .l{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.divider .l.r{background:linear-gradient(90deg,var(--gold-dim),transparent)}
.divider .d{font-size:9px;transform:rotate(45deg);opacity:.8}
.logline{font-size:11.5px;color:var(--ink-dim);font-family:sans-serif;letter-spacing:1px;
  text-align:center;max-width:560px;margin-bottom:30px;line-height:1.9}
.stage{display:flex;flex-direction:column;align-items:center;max-width:660px;width:100%;gap:0}
.left{width:100%;display:flex;flex-direction:column}
.right{width:100%;margin-bottom:22px}
.imgframe{width:100%;aspect-ratio:16/10;border-radius:16px;overflow:hidden;position:relative;
  background:#0d0a07;padding:5px;
  box-shadow:0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,168,76,0.28), inset 0 0 0 1px rgba(0,0,0,0.6)}
.imgframe::after{content:'';position:absolute;inset:5px;border-radius:12px;pointer-events:none;
  box-shadow:inset 0 0 70px rgba(0,0,0,0.55);z-index:2}
#scene-img{width:100%;height:100%;object-fit:cover;border-radius:12px;opacity:0;transition:opacity 1.2s;display:block}
#scene-img.show{opacity:1}
.imgload{position:absolute;inset:5px;display:none;align-items:center;justify-content:center;border-radius:12px;
  color:var(--gold-dim);font-family:'Cinzel',serif;font-size:11px;letter-spacing:7px;z-index:3}
.imgload.on{display:flex;animation:blink 1.6s infinite}
.imgcap{margin-top:11px;text-align:center;font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--ink-dim)}
.narration{width:100%;border:1px solid var(--line);border-top:1px solid rgba(201,168,76,0.4);
  border-radius:14px;padding:30px 32px;line-height:2.18;font-size:1.12rem;font-weight:300;min-height:158px;
  background:linear-gradient(180deg,rgba(201,168,76,0.045),rgba(255,255,255,0.012));
  box-shadow:0 12px 40px rgba(0,0,0,0.35);margin-bottom:22px;transition:opacity .5s;white-space:pre-wrap}
.narration::first-letter{font-size:1.5em;color:var(--gold-b)}
.narration .ln{margin:0 0 7px}
.narration .ln.spk{color:#dcc78d}
.narration .ln .who{color:var(--gold-b);font-family:sans-serif;font-size:11px;letter-spacing:1px;margin-right:9px;padding:1px 8px;border:1px solid rgba(201,168,76,0.32);border-radius:9px;white-space:nowrap}
.choices{display:flex;flex-direction:column;gap:11px;width:100%}
.choice{border:1px solid rgba(154,128,72,0.32);border-radius:11px;padding:15px 20px;cursor:pointer;
  background:linear-gradient(180deg,rgba(154,128,72,0.09),rgba(154,128,72,0.03));color:var(--ink);
  font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:1px;text-align:left;position:relative;
  transition:all .22s;overflow:hidden}
.choice:hover{border-color:var(--gold);background:linear-gradient(180deg,rgba(201,168,76,0.2),rgba(154,128,72,0.06));
  transform:translateX(4px);box-shadow:-3px 0 18px rgba(201,168,76,0.12)}
.choice .rdy{position:absolute;top:50%;right:14px;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;
  background:#5c9a5c;opacity:0;transition:opacity .4s;box-shadow:0 0 8px #5c9a5c}
.choice.ready .rdy{opacity:.9}
.type-row{display:flex;gap:8px;width:100%;margin-top:14px}
.type-row input{flex:1;background:rgba(154,128,72,0.06);border:1px solid rgba(154,128,72,0.3);
  border-radius:11px;color:var(--ink);font-family:'Noto Serif SC',serif;font-size:14px;padding:13px 15px;outline:none}
.type-row button{background:linear-gradient(180deg,rgba(201,168,76,0.22),rgba(154,128,72,0.08));
  border:1px solid var(--gold-dim);color:var(--gold-b);border-radius:11px;padding:0 22px;cursor:pointer;
  font-family:'Noto Serif SC',serif;letter-spacing:3px}
.ending{text-align:center;color:var(--gold-b);letter-spacing:8px;font-size:1.15rem;margin:22px 0;
  font-family:'Noto Serif SC',serif;text-shadow:0 2px 20px rgba(201,168,76,0.3)}
#overlay{position:fixed;inset:0;z-index:60;background:radial-gradient(circle at 50% 40%,#141009,#070504);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .9s}
#overlay.hide{opacity:0;pointer-events:none}
.ov-eyebrow{font-family:'Cinzel',serif;font-size:12px;letter-spacing:10px;color:var(--gold-dim);text-indent:10px}
.ov-title{font-size:2rem;font-weight:600;color:var(--gold);letter-spacing:12px;text-indent:12px;margin-bottom:14px;
  text-shadow:0 3px 30px rgba(201,168,76,0.3)}
.start-btn{border:1px solid var(--gold-dim);background:linear-gradient(180deg,rgba(201,168,76,0.14),rgba(154,128,72,0.04));
  color:var(--gold-b);font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:7px;text-indent:7px;
  padding:17px 46px;border-radius:40px;cursor:pointer;transition:all .3s;animation:pulse 3s ease-in-out infinite}
.start-btn:hover{background:linear-gradient(180deg,rgba(201,168,76,0.3),rgba(154,128,72,0.1));border-color:var(--gold)}
.ov-hint{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--ink-dim);margin-top:6px}
#bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(10,8,6,0.86);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);padding:13px 18px;display:flex;align-items:center;gap:15px;
  font-family:sans-serif;font-size:11px;color:var(--gold-dim);letter-spacing:1px;flex-wrap:wrap;justify-content:center}
#bar input[type=range]{accent-color:var(--gold);width:120px}
#bar .btn{border:1px solid rgba(154,128,72,0.4);border-radius:16px;padding:6px 15px;cursor:pointer;color:var(--gold-dim);transition:all .2s}
#bar .btn:hover{color:var(--gold-b);border-color:var(--gold)}
#bar label{display:flex;align-items:center;gap:5px;cursor:pointer}
#bar input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px;cursor:pointer}
.foot{margin-top:36px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:#4f4230;text-align:center}
.thinking{font-family:'Cinzel',serif;font-size:11px;letter-spacing:5px;color:var(--gold-dim);text-align:center;margin:0 0 14px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.35}50%{opacity:.85}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 26px rgba(201,168,76,0.22)}}
#world-pick{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:600px;margin:4px 0}
.world-card{width:262px;text-align:left;padding:18px 20px;border-radius:14px;cursor:pointer;
  border:1px solid rgba(154,128,72,0.35);background:linear-gradient(180deg,rgba(201,168,76,0.08),rgba(154,128,72,0.03));transition:all .25s}
.world-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 14px 34px rgba(0,0,0,0.45)}
.world-card .wt{font-size:1.02rem;color:var(--gold);letter-spacing:3px;margin-bottom:9px}
.world-card .wl{font-size:11px;color:var(--ink-dim);font-family:sans-serif;line-height:1.75}
#hud{display:none;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;margin:-6px 0 16px;
  font-family:sans-serif;font-size:11px;letter-spacing:1px;color:var(--gold-dim)}
#hud.on{display:flex}
#hud .clk{color:var(--gold-b);font-family:'Cinzel',serif;letter-spacing:2px}
#hud .rule{border:1px solid rgba(154,128,72,0.35);border-radius:12px;padding:3px 10px;color:var(--ink-dim)}
.ending.dead{color:#c96b5c;text-shadow:0 2px 22px rgba(201,90,70,0.35)}
@media(max-width:920px){ .stage{flex-direction:column;align-items:center} .right{width:100%;max-width:540px;order:-1} .left{max-width:540px} }
</style>
</head>
<body>
<div id="vignette"></div>
<audio id="bgm" loop preload="auto"></audio>
<div id="app">
  <div class="eyebrow">HOFFMAN · 魔毯世界</div>
  <div class="title" id="hdr-title">潮汐灯塔 · 风暴夜</div>
  <div class="divider"><span class="l"></span><span class="d">◆</span><span class="l r"></span></div>
  <div class="logline" id="hdr-logline">选择一个世界，开始今夜。</div>
  <div class="stage">
    <div id="hud"></div>
    <div class="right">
      <div class="imgframe">
        <img id="scene-img" alt="">
        <div class="imgload" id="imgload">PAINTING</div>
      </div>
    </div>
    <div class="left">
      <div class="narration" id="narration">铺开你的魔毯……</div>
      <div id="thinking" class="thinking" style="display:none">THE WORLD WHISPERS</div>
      <div class="choices" id="choices"></div>
      <div class="type-row" id="type-row" style="display:none">
        <input id="type-input" placeholder="或者，说出你想做的事…" maxlength="40">
        <button id="type-go">出发</button>
      </div>
    </div>
  </div>
  <div class="foot">创意版权归属「活满」所有 · 贡献人 炜仔 及活满全体工作人员</div>
</div>

<div id="bar">
  <span>意外程度</span>
  <input type="range" id="surprise" min="0" max="100" value="40">
  <span id="surprise-val">40</span>
  <label><input type="checkbox" id="prefetch" checked>预生成</label>
  <label><input type="checkbox" id="imgon" checked>配图</label>
  <label><input type="checkbox" id="bgmon" checked>配乐</label>
  <input type="range" id="bgmvol" min="0" max="100" value="35" style="width:80px" title="配乐音量">
  <span class="btn" id="reroll">换一种命运</span>
  <span class="btn" id="restart">重新开始</span>
  <span id="seed-label"></span>
</div>

<div id="overlay">
  <div class="ov-eyebrow">HOFFMAN · 魔毯世界</div>
  <div class="ov-title">选择一个世界</div>
  <div id="world-pick"></div>
  <div class="ov-hint">PUT ON HEADPHONES · DIM THE LIGHTS</div>
</div>

<script>
const $ = id => document.getElementById(id);
let state = null, busy = false;
let seed = Math.floor(Math.random()*1e6);
let surprise = 40, prefetchOn = true, imgOn = true;
let bgmOn = true, bgmVol = 0.35, curTrack = '';
let worldId = 'storm-lighthouse';
let pf = new Map();
const ttsCache = new Map();
const imgCache = new Map();

$('surprise').addEventListener('input', e => { surprise = +e.target.value; $('surprise-val').textContent = surprise; if (state) state.params.surprise = surprise; });
$('prefetch').addEventListener('change', e => { prefetchOn = e.target.checked; if (!prefetchOn) clearPrefetch(); });
$('imgon').addEventListener('change', e => { imgOn = e.target.checked; });
$('bgmon').addEventListener('change', e => { bgmOn = e.target.checked; const a=$('bgm'); if(!bgmOn){ a.pause(); } else if(curTrack){ a.src='/bgm/'+curTrack+'.mp3'; a.dataset.track=curTrack; a.volume=playing?bgmVol*0.28:bgmVol; a.play().catch(()=>{}); } });
$('bgmvol').addEventListener('input', e => { bgmVol = +e.target.value/100; const a=$('bgm'); if(a && bgmOn) a.volume = playing ? bgmVol*0.28 : bgmVol; });
function setThinking(on){ $('thinking').style.display = on ? 'block' : 'none'; }
function showSeed(){ $('seed-label').textContent = '种子 #' + seed; }
function duck(on){ const a=$('bgm'); if(a){ a.volume = bgmOn ? (on ? bgmVol*0.28 : bgmVol) : 0; } }
function setBgm(track){ if(!track) return; const a=$('bgm'); if(a.dataset.track===track){ if(bgmOn && a.paused) a.play().catch(()=>{}); return; } a.dataset.track=track; curTrack=track; if(!bgmOn) return; a.src='/bgm/'+track+'.mp3'; a.volume = playing ? bgmVol*0.28 : bgmVol; a.play().catch(()=>{}); }

// ── 语音：预取 + 分句流水线 + 可取消队列（修复换幕时旁白不发声）──
function ensureTTS(text, voice){
  if (!text) return Promise.resolve(null);
  const k = (voice||'') + '|' + text;
  if (!ttsCache.has(k)) ttsCache.set(k,
    fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(voice ? { text, voice } : { text }) })
      .then(r => r.ok ? r.blob() : null).catch(()=>null));
  return ttsCache.get(k);
}
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scriptHtml(text, voices){
  return String(text).split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
    const m = line.match(/^([^：:]{1,8})[：:]\s*(.+)$/);
    if (m && m[1]!=='旁白' && voices[m[1]]!==undefined) return '<div class="ln spk"><span class="who">'+esc(m[1])+'</span>'+esc(m[2])+'</div>';
    return '<div class="ln">'+esc(line.replace(/^旁白[：:]\s*/,''))+'</div>';
  }).join('');
}
function splitSentences(t){ return String(t||'').split(/(?<=[。！？…\n])/).map(s=>s.trim()).filter(Boolean); }

let audio = null, queue = [], playing = false, gen = 0, curResolve = null;
function stopAudio(){
  gen++; queue.length = 0;
  if (audio){ try{ audio.pause(); }catch(e){} audio = null; }
  if (curResolve){ const r = curResolve; curResolve = null; r(); }   // 解开正在等待的播放，避免队列卡死
}
function enqueue(x){ const it = (typeof x==='string') ? {text:x,voice:null} : x; if (it && it.text){ queue.push(it); pump(); } }
function enqueueNarration(text){ splitSentences(text).forEach(s => queue.push({text:s,voice:null})); pump(); }
function enqueueScript(text, voices){
  String(text).split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
    const m = line.match(/^([^：:]{1,8})[：:]\s*(.+)$/);
    if (m && voices[m[1]]!==undefined) queue.push({text:m[2], voice:voices[m[1]]});
    else { const t=line.replace(/^旁白[：:]\s*/,''); splitSentences(t).forEach(s=>queue.push({text:s,voice:(voices['旁白']||null)})); }
  });
  pump();
}
function showNarration(data){
  const box=$('narration'); box.style.opacity=0;
  setTimeout(()=>{ if(data.voices){ box.innerHTML=scriptHtml(data.narration,data.voices); } else { box.textContent=data.narration; } box.style.opacity=1; },160);
  if(data.voices) enqueueScript(data.narration, data.voices); else enqueueNarration(data.narration);
}
async function pump(){
  if (playing) return;
  playing = true; duck(true);
  try{
    while (queue.length){
      const myGen = gen;
      const it = queue.shift();
      const curBlob = ensureTTS(it.text, it.voice);
      if (queue.length) ensureTTS(queue[0].text, queue[0].voice);
      const blob = await curBlob;
      if (myGen !== gen) break;
      if (blob){
        await new Promise(res => {
          curResolve = res;
          audio = new Audio(URL.createObjectURL(blob));
          const done = () => { if (curResolve === res) curResolve = null; res(); };
          audio.onended = done; audio.onerror = done; audio.play().catch(done);
        });
        if (myGen !== gen) break;
      }
    }
  } finally {
    playing = false; duck(false);
    if (queue.length) pump();   // 若期间有新内容排入，重启播放
  }
}

// ── 配图：同一幕三选项 = 同一张图，去重只画一张 ──
function ensureImage(prompt){
  if (!imgOn || !prompt) return Promise.resolve(null);
  if (!imgCache.has(prompt)) imgCache.set(prompt,
    fetch('/api/image', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ prompt }) })
      .then(r => r.ok ? r.json() : null).then(d => d && d.url || null).catch(()=>null));
  return imgCache.get(prompt);
}
async function showImage(prompt){
  if (!imgOn || !prompt) return;
  const load = $('imgload'), img = $('scene-img');
  load.classList.add('on');
  const url = await ensureImage(prompt);
  if (!url){ load.classList.remove('on'); return; }
  const pre = new Image();
  pre.onload = () => { img.classList.remove('show'); img.src = url; requestAnimationFrame(()=>img.classList.add('show')); load.classList.remove('on'); };
  pre.onerror = () => load.classList.remove('on');
  pre.src = url;
}

function render(data){
  const box = $('choices'); box.innerHTML = '';
  updateHud(data.hud);
  if (data.done){
    const e = document.createElement('div'); e.className='ending' + (data.ending && (data.ending.id==='dead'||data.ending.id==='A') ? ' dead' : '');
    e.textContent = '· ' + (data.ending?.title || '故事落幕') + ' ·';
    box.appendChild(e);
    $('type-row').style.display = 'none';
    clearPrefetch();
  } else {
    (data.choices||[]).forEach(c => {
      const b = document.createElement('div'); b.className='choice'; b.dataset.c = c;
      b.innerHTML = '<span class="rdy"></span>' + c;
      b.onclick = () => step(c);
      box.appendChild(b);
      ensureTTS(c, null);
    });
    $('type-row').style.display = 'flex';
    startPrefetch(data.choices || []);
  }
  if (data.world_meta) setHeader(data.world_meta.title, data.world_meta.logline);
  if (data.bgm) setBgm(data.bgm);
  showNarration(data);
  if (data.image_prompt) showImage(data.image_prompt);
}

function clearPrefetch(){ for (const {controller} of pf.values()){ try{ controller.abort(); }catch(e){} } pf = new Map(); }
function startPrefetch(choices){
  clearPrefetch();
  if (!prefetchOn || !state) return;
  const snap = JSON.stringify(state);
  choices.forEach(c => {
    const controller = new AbortController();
    const promise = fetch('/api/story', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ state: JSON.parse(snap), choice: c }), signal: controller.signal })
      .then(r => r.ok ? r.json() : null).catch(()=>null)
      .then(d => {
        if (d){
          const el = document.querySelector('.choice[data-c="'+CSS.escape(c)+'"]'); if (el) el.classList.add('ready');
          if (d.image_prompt) ensureImage(d.image_prompt);
          if (d.narration) splitSentences(d.narration).slice(0,1).forEach(s => ensureTTS(s, null));
        }
        return d;
      });
    pf.set(c, { promise, controller });
  });
}

async function callStory(payload){
  setThinking(true); busy = true;
  try{
    const r = await fetch('/api/story', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await r.json();
    if (!r.ok){ $('narration').textContent = '（引擎出错：' + (data.detail||data.error||'请重试') + '）'; return null; }
    state = data.state; render(data); return data;
  }catch(e){ $('narration').textContent = '（网络异常，请重试）'; return null; }
  finally{ setThinking(false); busy = false; }
}

async function start(){ stopAudio(); await callStory({ world_id: worldId, params:{ seed, surprise } }); }

async function step(choice){
  if (busy || !state) return;
  stopAudio();
  enqueue(choice);
  const hit = pf.get(choice);
  for (const [c,{controller}] of pf.entries()){ if (c !== choice){ try{ controller.abort(); }catch(e){} } }
  if (hit){
    setThinking(true); busy = true;
    const data = await hit.promise;
    setThinking(false); busy = false;
    pf = new Map();
    if (data && data.state){ state = data.state; render(data); return; }
  }
  pf = new Map();
  await callStory({ state, choice });
}

$('type-go').addEventListener('click', ()=>{ const t=$('type-input').value.trim(); if(t){ $('type-input').value=''; step(t); } });
$('type-input').addEventListener('keydown', e=>{ if(e.key==='Enter'){ const t=e.target.value.trim(); if(t){ e.target.value=''; step(t);} } });
$('reroll').addEventListener('click', ()=>{ seed = Math.floor(Math.random()*1e6); showSeed(); state=null; clearPrefetch(); start(); });
$('restart').addEventListener('click', ()=>{ state=null; clearPrefetch(); start(); });
const WORLDS = [
  { id:'storm-lighthouse', bgm:'Long_Note_Two', title:'潮汐灯塔 · 风暴夜', logline:'风暴将至的孤岛旧灯塔，一艘船正驶向礁石，而今夜每个人都藏着一件事。你被困在这里，成了今夜的关键。' },
  { id:'nie-xiaoqian', bgm:'Echoes_of_Time', title:'兰若寺 · 聂小倩', logline:'荒山古寺，月色如霜。你夜宿于此，一位白衣女子踏月而来——她的温柔里，藏着一桩要命的差事。' },
  { id:'silence-zero', bgm:'Ossuary_1_A_Beginning', title:'噤声 · 归零（死亡游戏）', logline:'没有门窗的密室，一盏红灯，一面镜子。手腕刺着"第7日"。规则会杀死不守规则的人——你得先弄清规则，才活得过下一次红灯。' },
  { id:'liars-table', bgm:'Ossuary_1_A_Beginning', title:'说谎者 · 圆桌（推理）', logline:'密室圆桌，山羊面具的人说：讲故事的人里有且只有一个说谎者，选错一票全员偿命。可越推越不对劲——赢面为什么这么大？' },
];
function setHeader(t,l){ $('hdr-title').textContent=t; $('hdr-logline').textContent=l; document.title=t+' — 魔毯世界'; }
function updateHud(hud){ const h=$('hud'); if(!hud){ h.classList.remove('on'); h.innerHTML=''; return; }
  if(hud.mode==='deduction'){
    const ls=(hud.layers||[]).map(l=>'<span class="rule">已揭 '+l+'</span>').join('');
    h.innerHTML='<span class="clk">'+hud.phase+'阶段</span><span class="rule">线索 '+hud.clues+'/'+hud.clues_total+'</span>'+ls;
  } else {
    const rules=(hud.discovered||[]).map(r=>'<span class="rule">已知 '+r+'</span>').join('');
    h.innerHTML='<span class="clk">红灯剩 '+hud.clock+' '+(hud.unit||'')+'</span>'+(rules||'<span class="rule">规则未明</span>');
  }
  h.classList.add('on'); }
function chooseWorld(o){ worldId=o.id; setHeader(o.title,o.logline); $('overlay').classList.add('hide'); showSeed(); setBgm(o.bgm); start(); }
(function buildPick(){ const w=$('world-pick'); WORLDS.forEach(o=>{ const c=document.createElement('div'); c.className='world-card'; c.innerHTML='<div class="wt">'+o.title+'</div><div class="wl">'+o.logline+'</div>'; c.onclick=()=>chooseWorld(o); w.appendChild(c); }); })();
showSeed();
</script>
</body>
</html>
