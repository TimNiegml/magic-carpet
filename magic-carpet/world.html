<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮汐灯塔 · 风暴夜 — 魔毯世界</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0c0b09}
#app{min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%,#141109,#0c0b09);
  font-family:'Noto Serif SC',Georgia,serif;color:#e8d9b0;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:40px 22px 120px;position:relative}
.eyebrow{font-size:10px;letter-spacing:8px;color:#6a5228;font-family:sans-serif;margin-bottom:10px;text-align:center}
.title{font-size:1.5rem;font-weight:300;color:#c9a84c;letter-spacing:8px;text-align:center;margin-bottom:6px}
.logline{font-size:11px;color:#6a5228;font-family:sans-serif;letter-spacing:1px;text-align:center;max-width:460px;margin-bottom:28px;line-height:1.8}
.narration{max-width:560px;width:100%;border:0.5px solid rgba(201,168,76,0.2);border-radius:16px;
  padding:30px 32px;line-height:2.1;font-size:1.05rem;font-weight:300;min-height:150px;
  background:rgba(255,255,255,0.018);margin-bottom:26px;transition:opacity .5s;white-space:pre-wrap}
.choices{display:flex;flex-direction:column;gap:10px;max-width:560px;width:100%}
.choice{border:0.5px solid rgba(154,128,72,0.32);background:rgba(154,128,72,0.06);color:#e8d9b0;
  border-radius:12px;padding:14px 18px;cursor:pointer;font-family:'Noto Serif SC',serif;font-size:15px;
  letter-spacing:1px;text-align:left;transition:all .2s}
.choice:hover{background:rgba(154,128,72,0.18);border-color:#c9a84c}
.type-row{display:flex;gap:8px;max-width:560px;width:100%;margin-top:12px}
.type-row input{flex:1;background:rgba(154,128,72,0.06);border:0.5px solid rgba(154,128,72,0.3);
  border-radius:12px;color:#e8d9b0;font-family:'Noto Serif SC',serif;font-size:14px;padding:12px 14px;outline:none}
.type-row button{background:rgba(154,128,72,0.15);border:0.5px solid #9a8048;color:#c9a84c;border-radius:12px;
  padding:0 20px;cursor:pointer;font-family:'Noto Serif SC',serif;letter-spacing:2px}
.ending{text-align:center;color:#c9a84c;letter-spacing:6px;font-size:1.1rem;margin:20px 0}
#overlay{position:fixed;inset:0;z-index:50;background:rgba(12,11,9,0.94);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .8s}
#overlay.hide{opacity:0;pointer-events:none}
.start-btn{border:0.5px solid #9a8048;background:rgba(154,128,72,0.1);color:#c9a84c;
  font-family:'Noto Serif SC',serif;font-size:15px;letter-spacing:6px;padding:16px 44px;border-radius:40px;cursor:pointer}
.start-btn:hover{background:rgba(154,128,72,0.25)}
#bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(14,12,9,0.92);
  border-top:0.5px solid rgba(154,128,72,0.25);padding:12px 18px;display:flex;align-items:center;gap:16px;
  font-family:sans-serif;font-size:11px;color:#9a8048;letter-spacing:1px;flex-wrap:wrap;justify-content:center}
#bar input[type=range]{accent-color:#c9a84c;width:140px}
#bar .btn{border:0.5px solid rgba(154,128,72,0.4);border-radius:16px;padding:6px 14px;cursor:pointer;color:#9a8048}
#bar .btn:hover{color:#c9a84c;border-color:#c9a84c}
.foot{margin-top:34px;font-size:10px;letter-spacing:1.5px;color:#5a4a28;font-family:sans-serif;text-align:center}
.thinking{font-size:11px;letter-spacing:4px;color:#6a5228;font-family:sans-serif;text-align:center;margin:8px 0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:.9}}
</style>
</head>
<body>
<div id="app">
  <div class="eyebrow">HOFFMAN · 魔毯世界</div>
  <div class="title">潮汐灯塔 · 风暴夜</div>
  <div class="logline">风暴将至的孤岛旧灯塔，一艘船正驶向礁石，而今夜每个人都藏着一件事。你被困在这里，成了今夜的关键。</div>
  <div class="narration" id="narration">铺开你的魔毯……</div>
  <div id="thinking" class="thinking" style="display:none">✦ 世界在低语 ✦</div>
  <div class="choices" id="choices"></div>
  <div class="type-row" id="type-row" style="display:none">
    <input id="type-input" placeholder="或者，说出你想做的事…" maxlength="40">
    <button id="type-go">出发</button>
  </div>
  <div class="foot">创意版权归属「活满」所有 · 贡献人：炜仔 及活满全体工作人员</div>
</div>

<div id="bar">
  <span>意外程度</span>
  <input type="range" id="surprise" min="0" max="100" value="40">
  <span id="surprise-val">40</span>
  <span class="btn" id="reroll">换一种命运（新种子）</span>
  <span class="btn" id="restart">重新开始</span>
  <span id="seed-label"></span>
</div>

<div id="overlay">
  <div class="eyebrow">潮汐灯塔 · 风暴夜</div>
  <button class="start-btn" id="start-btn">轻触魔毯 · 进入这一夜</button>
  <div style="font-size:10px;letter-spacing:3px;color:#6a5228;font-family:sans-serif">戴上耳机，调暗灯光</div>
</div>

<script>
const $ = id => document.getElementById(id);
let state = null, busy = false, audio = null;
let seed = Math.floor(Math.random()*1e6);
let surprise = 40;

$('surprise').addEventListener('input', e => { surprise = +e.target.value; $('surprise-val').textContent = surprise; if (state) state.params.surprise = surprise; });

function setThinking(on){ $('thinking').style.display = on ? 'block' : 'none'; }
function showSeed(){ $('seed-label').textContent = '种子 #' + seed; }

async function playTTS(text){
  try{
    const r = await fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ text }) });
    if(!r.ok) return;
    const blob = await r.blob();
    if(audio){ try{audio.pause();}catch(e){} }
    audio = new Audio(URL.createObjectURL(blob));
    audio.play().catch(()=>{});
  }catch(e){}
}

function render(data){
  $('narration').style.opacity = 0;
  setTimeout(()=>{ $('narration').textContent = data.narration; $('narration').style.opacity = 1; }, 200);
  const box = $('choices'); box.innerHTML = '';
  if(data.done){
    const e = document.createElement('div'); e.className='ending';
    e.textContent = '· ' + (data.ending?.title || '故事落幕') + ' ·';
    box.appendChild(e);
    $('type-row').style.display = 'none';
  } else {
    (data.choices||[]).forEach(c => {
      const b = document.createElement('div'); b.className='choice'; b.textContent = c;
      b.onclick = () => step(c);
      box.appendChild(b);
    });
    $('type-row').style.display = 'flex';
  }
  playTTS(data.narration);
}

async function callStory(payload){
  setThinking(true); busy = true;
  try{
    const r = await fetch('/api/story', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await r.json();
    if(!r.ok){ $('narration').textContent = '（引擎出错：' + (data.detail||data.error||'请重试') + '）'; return null; }
    state = data.state;
    render(data);
    return data;
  }catch(e){ $('narration').textContent = '（网络异常，请重试）'; return null; }
  finally{ setThinking(false); busy = false; }
}

async function start(){
  await callStory({ world_id:'storm-lighthouse', params:{ seed, surprise } });
}
async function step(choice){
  if(busy || !state) return;
  await callStory({ state, choice });
}

$('type-go').addEventListener('click', ()=>{ const t=$('type-input').value.trim(); if(t){ $('type-input').value=''; step(t); } });
$('type-input').addEventListener('keydown', e=>{ if(e.key==='Enter'){ const t=e.target.value.trim(); if(t){ e.target.value=''; step(t);} } });
$('reroll').addEventListener('click', ()=>{ seed = Math.floor(Math.random()*1e6); showSeed(); state=null; start(); });
$('restart').addEventListener('click', ()=>{ state=null; start(); });

$('start-btn').addEventListener('click', ()=>{
  $('overlay').classList.add('hide');
  showSeed();
  start();
});
showSeed();
</script>
</body>
</html>
